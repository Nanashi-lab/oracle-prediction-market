# Audit Trail Logger Workflow
# EVM Log trigger — listens for RoundResolved events, writes audit log to Firestore

staging-settings:
  user-workflow:
    workflow-name: "audit-trail-workflow-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "audit-trail-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
