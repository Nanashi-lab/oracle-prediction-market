# Alpha Price Workflow
# Fetches price from Alpha server every 5 minutes and determines UP/DOWN outcome

staging-settings:
  user-workflow:
    workflow-name: "alpha-workflow-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: ""

production-settings:
  user-workflow:
    workflow-name: "alpha-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: ""
