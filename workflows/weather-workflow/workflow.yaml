# Weather Oracle Workflow
# Fetches current weather from OpenWeatherMap and resolves rain/no-rain markets

staging-settings:
  user-workflow:
    workflow-name: "weather-workflow-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "weather-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
